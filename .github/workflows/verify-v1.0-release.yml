name: Verify Veritaxa v1.0 release

on:
  pull_request:
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - 'release/v1.0/**'
      - '.github/workflows/verify-v1.0-release.yml'
  push:
    branches: [main]
    paths:
      - 'README.md'
      - 'CHANGELOG.md'
      - 'docs/**'
      - 'release/v1.0/**'
      - '.github/workflows/verify-v1.0-release.yml'

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip pytest
      - run: python release/v1.0/verify_release.py
