name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Materialize release
        run: python release/v0.7/materialize.py --output-dir build --extract
      - name: Install and test
        working-directory: build/source
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e .
          python -m pytest -q
